<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣藝術尋寶之旅|基隆 ➜ 屏東 30 關</title>
<style>
:root{
  --ink:#16211c; --ink2:#0f1713;
  --gold:#c9a227; --gold2:#e6c65c;
  --seal:#b3352b;
  --paper:#f2ead8; --paper2:#e4d8bc;
  --dim:#9db09f;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:
    radial-gradient(1200px 600px at 50% -10%, #24352c 0%, transparent 60%),
    radial-gradient(900px 500px at 50% 110%, #1d2b24 0%, transparent 55%),
    var(--ink);
  color:var(--paper);
  font-family:"PingFang TC","Microsoft JhengHei","Heiti TC","Noto Sans TC",sans-serif;
  display:flex;justify-content:center;
  min-height:100%;
}
#app{width:100%;max-width:1020px;padding:14px 12px 40px}
.screen{animation:fadein .5s ease}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

h1{
  font-family:"DFKai-SB","BiauKai","Kaiti TC","標楷體","Noto Serif TC",serif;
  font-size:clamp(34px,7vw,58px);
  letter-spacing:.14em;text-align:center;color:var(--gold2);
  text-shadow:0 2px 0 rgba(0,0,0,.4);
  margin-top:26px;
}
.sub{text-align:center;color:var(--dim);letter-spacing:.28em;margin:10px 0 20px;font-size:14px}
.rule{width:140px;height:2px;margin:0 auto 18px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.desc{max-width:640px;margin:0 auto;line-height:1.9;font-size:15px;color:#dfd6ba;text-align:justify}
.tiny{text-align:center;color:#7f927f;font-size:12px;margin-top:18px;line-height:1.7}
.btnrow{display:flex;gap:12px;justify-content:center;margin:26px 0 8px;flex-wrap:wrap}
.btn{
  border:none;cursor:pointer;border-radius:999px;
  font-family:inherit;font-size:16px;letter-spacing:.12em;
  padding:13px 30px;transition:transform .12s ease, box-shadow .12s ease;
}
.btn:active{transform:scale(.96)}
.btn.gold{
  background:linear-gradient(180deg,var(--gold2),var(--gold));
  color:#3a2c10;font-weight:700;
  box-shadow:0 4px 14px rgba(201,162,39,.35), inset 0 1px 0 rgba(255,255,255,.5);
}
.btn.line{background:transparent;color:var(--gold2);border:1px solid var(--gold)}
.btn.small{padding:8px 14px;font-size:14px;letter-spacing:.05em}

#routeGrid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:8px;max-width:820px;margin:26px auto 0;
}
.stop{
  border:1px solid #33463b;border-radius:8px;padding:8px 10px;
  background:rgba(255,255,255,.03);font-size:12px;line-height:1.5;color:#cfc7a8;
}
.stop b{color:var(--gold2);font-weight:600;display:block;font-size:12px}
.stop.done{border-color:var(--gold);background:rgba(201,162,39,.12)}
.stop.done b::after{content:" ✓";color:var(--gold2)}

/* ---- game ---- */
#hud{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:6px 2px 12px}
#lvlInfo{display:flex;flex-direction:column}
#lvlNum{color:var(--gold2);font-size:13px;letter-spacing:.2em}
#lvlPlace{font-family:"DFKai-SB","BiauKai","標楷體",serif;font-size:22px;letter-spacing:.1em}
#srcBadge{font-size:11px;color:#8fa08f;letter-spacing:.04em;margin-top:2px}
#lvlTitle{flex:1;min-width:180px;text-align:center;color:#dfd6ba;font-size:14px;line-height:1.6}
.hudbtns{display:flex;gap:8px}

#frameWrap{
  position:relative;border-radius:6px;padding:12px;
  background:
    linear-gradient(135deg,#8a6a22,#e6c65c 30%,#9a7a2a 55%,#e0bd53 80%,#7a5e1e);
  box-shadow:0 14px 40px rgba(0,0,0,.55), inset 0 0 0 2px rgba(60,44,10,.6);
}
#frameWrap::after{
  content:"";position:absolute;inset:9px;border:1px solid rgba(60,44,10,.55);pointer-events:none;border-radius:3px;
}
#frameWrap.shake{animation:shk .3s ease}
@keyframes shk{0%,100%{transform:none}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
canvas#cv{display:block;width:100%;height:auto;border-radius:2px;cursor:crosshair;background:#111}

#slots{display:flex;gap:8px;justify-content:center;margin:14px 0 10px;flex-wrap:wrap}
.slot{
  border:1px dashed #4a5c4e;border-radius:999px;padding:7px 16px;font-size:14px;color:#8fa08f;
  min-width:104px;text-align:center;
}
.slot.on{border:1px solid var(--gold);color:var(--gold2);background:rgba(201,162,39,.12)}

#journey{margin-top:10px}
#jLabel{text-align:center;font-size:13px;color:var(--dim);margin-bottom:8px;letter-spacing:.1em}
#dots{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;max-width:760px;margin:0 auto}
.dot{width:12px;height:12px;border-radius:50%;background:#33463b;border:1px solid #4a5c4e}
.dot.done{background:var(--gold);border-color:var(--gold2)}
.dot.now{background:var(--seal);border-color:#e88a7a;box-shadow:0 0 0 3px rgba(179,53,43,.3)}

/* ---- modal ---- */
.overlay{
  position:fixed;inset:0;background:rgba(8,12,10,.78);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;padding:18px;z-index:50;
}
.card{
  position:relative;background:var(--paper);color:#3a2f22;border-radius:10px;
  max-width:480px;width:100%;padding:34px 28px 28px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  border:1px solid #cdbf9e;
  animation:pop .35s cubic-bezier(.2,1.4,.4,1);
}
@keyframes pop{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.stamp{
  position:absolute;top:-24px;left:50%;transform:translateX(-50%) rotate(-8deg);
  width:52px;height:52px;border-radius:8px;background:var(--seal);color:#f6ecd8;
  font-family:"DFKai-SB","BiauKai","標楷體",serif;font-size:26px;line-height:52px;
  box-shadow:0 4px 10px rgba(0,0,0,.35);
}
.card h2{font-family:"DFKai-SB","BiauKai","標楷體",serif;font-size:24px;color:#7a2f22;margin-bottom:4px;letter-spacing:.06em}
.card .who{color:#6b5a3e;font-size:14px;margin-bottom:14px}
.card .fact{font-size:15px;line-height:1.9;text-align:justify;color:#4a3d2a;margin-bottom:20px}

/* ---- certificate ---- */
#certScreen h2{text-align:center;font-family:"DFKai-SB","BiauKai","標楷體",serif;font-size:30px;color:var(--gold2);margin:24px 0 16px;letter-spacing:.1em}
.namer{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.namer input{
  background:rgba(255,255,255,.06);border:1px solid #4a5c4e;color:var(--paper);
  border-radius:8px;padding:11px 14px;font-size:16px;font-family:inherit;width:200px;
}
canvas#cc{display:block;width:100%;max-width:760px;height:auto;margin:0 auto;border-radius:6px;box-shadow:0 14px 40px rgba(0,0,0,.5)}
[hidden]{display:none!important}
</style>
</head>
<body>
<div id="app">

  <section id="intro" class="screen">
    <h1>台灣藝術尋寶之旅</h1>
    <p class="sub">基 隆 ➜ 屏 東 ・ 三 十 關</p>
    <div class="rule"></div>
    <p class="desc">每一關,是一幅向台灣前輩藝術家致敬的重繪場景(程式繪製示意,非原作圖像)。請在畫中找出 <b>3 個隱藏細節</b>——其中一定藏著畫家的<b>落款印章</b>。從基隆港啟程,沿著倪蔣懷、陳澄波、郭雪湖、李梅樹、陳進……的足跡一路南行,走完 30 關,即可領取專屬的「藝術達人證書」。</p>
    <div class="btnrow">
      <button id="btnStart" class="btn gold">🖌 開始旅程</button>
      <button id="btnResume" class="btn line" hidden>繼續旅程</button>
    </div>
    <div id="routeGrid"></div>
    <p class="tiny">建議開啟聲音 🔊 旅途備有背景音樂與音效。<br>找不到細節時可按「💡 提示」。進度會自動儲存在此裝置。</p>
  </section>

  <section id="game" class="screen" hidden>
    <header id="hud">
      <div id="lvlInfo"><span id="lvlNum"></span><span id="lvlPlace"></span><span id="srcBadge"></span></div>
      <div id="lvlTitle"></div>
      <div class="hudbtns">
        <button id="btnView" class="btn small line">🖼 原作/示意</button>
        <button id="btnHint" class="btn small line">💡 提示</button>
        <button id="btnMute" class="btn small line">🔊</button>
      </div>
    </header>
    <div id="frameWrap"><canvas id="cv" width="960" height="600"></canvas></div>
    <div id="slots"></div>
    <div id="journey">
      <div id="jLabel"></div>
      <div id="dots"></div>
    </div>
  </section>

  <div id="modal" class="overlay" hidden>
    <div class="card">
      <div class="stamp">印</div>
      <h2 id="mTitle"></h2>
      <p class="who" id="mArtist"></p>
      <p class="fact" id="mFact"></p>
      <button id="btnNext" class="btn gold">下一關 →</button>
    </div>
  </div>

  <section id="certScreen" class="screen" hidden>
    <h2>🎉 恭喜走完全程 30 關!</h2>
    <div class="namer">
      <label for="certName">你的名字:</label>
      <input id="certName" maxlength="12" placeholder="藝術小達人">
      <button id="btnMake" class="btn gold">產生證書</button>
    </div>
    <canvas id="cc" width="1000" height="700"></canvas>
    <div class="btnrow">
      <button id="btnDL" class="btn gold">⬇ 下載證書 PNG</button>
      <button id="btnReplay" class="btn line">再玩一次</button>
    </div>
  </section>

</div>

<script>
'use strict';
/* ================= 基本工具 ================= */
const W = 960, H = 600;
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const $ = id => document.getElementById(id);
const TAU = Math.PI * 2;

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function R(c,x,y,w,h,f){c.fillStyle=f;c.fillRect(x,y,w,h);}
function C(c,x,y,r,f){c.beginPath();c.arc(x,y,r,0,TAU);c.fillStyle=f;c.fill();}
function E(c,x,y,rx,ry,f,rot){c.beginPath();c.ellipse(x,y,rx,ry,rot||0,0,TAU);c.fillStyle=f;c.fill();}
function P(c,pts,f){c.beginPath();c.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)c.lineTo(pts[i][0],pts[i][1]);c.closePath();c.fillStyle=f;c.fill();}
function LG(c,y0,y1,c0,c1){const g=c.createLinearGradient(0,y0,0,y1);g.addColorStop(0,c0);g.addColorStop(1,c1);return g;}
function sky(c,c0,c1,h){R(c,0,0,W,h,LG(c,0,h,c0,c1));}
function ridge(c,rn,baseY,amp,f,n){const pts=[[0,H],[0,baseY]];const step=W/n;for(let i=1;i<=n;i++){pts.push([i*step,baseY-rn()*amp]);}pts.push([W,H]);P(c,pts,f);}
function strokeTex(c,rn,cols,n){c.save();c.globalAlpha=.07;for(let i=0;i<n;i++){const x=rn()*W,y=rn()*H,a=rn()*TAU,l=6+rn()*16;c.strokeStyle=cols[(rn()*cols.length)|0];c.lineWidth=1.5+rn()*2.5;c.beginPath();c.moveTo(x,y);c.lineTo(x+Math.cos(a)*l,y+Math.sin(a)*l);c.stroke();}c.restore();}
function vignette(c){const g=c.createRadialGradient(W/2,H/2,H*.45,W/2,H/2,H*.85);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(25,16,8,.28)');c.fillStyle=g;c.fillRect(0,0,W,H);}
function fig(c,x,y,s,top,skin){R(c,x-3.5*s,y-6*s,7*s,12*s,top);C(c,x,y-10*s,3.6*s,skin||'#caa07a');}
function crowd(c,rn,n,x0,x1,y0,y1,cols){for(let i=0;i<n;i++){fig(c,x0+rn()*(x1-x0),y0+rn()*(y1-y0),.8+rn()*.7,cols[(rn()*cols.length)|0]);}}
function tree(c,x,y,s,leaf){R(c,x-2*s,y-14*s,4*s,14*s,'#5a4632');C(c,x,y-20*s,9*s,leaf);C(c,x-7*s,y-15*s,6.5*s,leaf);C(c,x+7*s,y-15*s,6.5*s,leaf);}
function palm(c,x,y,s){c.strokeStyle='#6b5138';c.lineWidth=4*s;c.beginPath();c.moveTo(x,y);c.quadraticCurveTo(x+4*s,y-30*s,x+9*s,y-52*s);c.stroke();const tx=x+9*s,ty=y-52*s;c.strokeStyle='#3f6b3a';c.lineWidth=2.5*s;for(let i=0;i<7;i++){const a=-2.6+i*.42;c.beginPath();c.moveTo(tx,ty);c.quadraticCurveTo(tx+Math.cos(a)*16*s,ty+Math.sin(a)*10*s-6*s,tx+Math.cos(a)*30*s,ty+Math.sin(a)*18*s+4*s);c.stroke();}}
function bananaTree(c,x,y,s){c.strokeStyle='#4c6b2f';c.lineWidth=5*s;c.beginPath();c.moveTo(x,y);c.lineTo(x,y-34*s);c.stroke();for(let i=0;i<6;i++){const a=-2.9+i*.55;c.strokeStyle=i%2?'#5f8a3a':'#4c7a30';c.lineWidth=7*s;c.beginPath();c.moveTo(x,y-34*s);c.quadraticCurveTo(x+Math.cos(a)*22*s,y-34*s+Math.sin(a)*16*s-8*s,x+Math.cos(a)*40*s,y-34*s+Math.sin(a)*26*s);c.stroke();}}
function boat(c,x,y,s,hull){P(c,[[x-24*s,y],[x+24*s,y],[x+16*s,y+8*s],[x-16*s,y+8*s]],hull);R(c,x-8*s,y-8*s,16*s,8*s,'#8a6a4a');c.strokeStyle='#3b2f24';c.lineWidth=2*s;c.beginPath();c.moveTo(x,y-8*s);c.lineTo(x,y-26*s);c.stroke();}
function duckS(c,x,y,s,body){E(c,x,y,7*s,4.5*s,body);C(c,x+6*s,y-4*s,2.8*s,body);P(c,[[x+8.5*s,y-4.5*s],[x+12*s,y-3.5*s],[x+8.5*s,y-2.8*s]],'#e08a2a');}
function shophouse(c,rn,x,w,hgt,face){const yT=430-hgt;R(c,x,yT,w,hgt,face);R(c,x-3,yT-8,w+6,10,'#7d5b3f');R(c,x+w*.3,yT-20,w*.4,14,face);
  const rows=Math.max(1,((hgt-70)/55)|0);
  for(let r=0;r<rows;r++){for(let wx=x+12;wx<x+w-20;wx+=30){R(c,wx,yT+16+r*52,16,26,'rgba(50,40,30,.55)');}}
  c.fillStyle='rgba(35,25,18,.6)';
  for(let ax=x+6;ax<x+w-30;ax+=36){c.beginPath();c.moveTo(ax,430);c.lineTo(ax,398);c.arc(ax+13,398,13,Math.PI,0);c.lineTo(ax+26,430);c.closePath();c.fill();}}
function swallowRoof(c,x,y,w,h,f){c.beginPath();c.moveTo(x-16,y);c.quadraticCurveTo(x+w*.5,y-h*1.7,x+w+16,y);c.quadraticCurveTo(x+w*.5,y+h*.45,x-16,y);c.closePath();c.fillStyle=f;c.fill();C(c,x-14,y-4,5,f);C(c,x+w+14,y-4,5,f);}
function stoneLion(c,x,y,s){E(c,x,y,9*s,7*s,'#9b937f');C(c,x+2*s,y-9*s,5.5*s,'#9b937f');C(c,x+2*s,y-9*s,3*s,'#7f7663');R(c,x-8*s,y+5*s,16*s,4*s,'#847b67');}
function ripples(c,rn,x0,x1,y0,y1,col,n){c.strokeStyle=col;c.lineWidth=1.6;c.globalAlpha=.55;for(let i=0;i<n;i++){const x=x0+rn()*(x1-x0),y=y0+rn()*(y1-y0),l=14+rn()*30;c.beginPath();c.moveTo(x,y);c.quadraticCurveTo(x+l/2,y-2,x+l,y);c.stroke();}c.globalAlpha=1;}
function pole(c,x,y0){c.strokeStyle='#3c332a';c.lineWidth=5;c.beginPath();c.moveTo(x,y0);c.lineTo(x,430);c.stroke();c.lineWidth=3;c.beginPath();c.moveTo(x-16,y0+14);c.lineTo(x+16,y0+14);c.stroke();}

/* ================= 場景模板 ================= */
const TPL = {};

TPL.harbor = (c,rn,v)=>{
  const su = v.sunset;
  sky(c, su?'#f7b26a':'#bcd6de', su?'#f2d9a8':'#e8eee6', 310);
  if(su){C(c,690,180,60,'rgba(246,210,140,.35)');C(c,690,180,34,'#f6e3b0');}
  P(c,[[430,300],[560,236],[640,258],[760,224],[900,268],[960,290],[960,310],[430,310]], su?'#8a6f7c':'#7e8f94');
  R(c,0,300,W,300,LG(c,300,600, su?'#d99a63':'#7fa5ad', su?'#8a5a44':'#41616c'));
  if(su){R(c,660,306,60,220,'rgba(250,220,150,.25)');}
  ripples(c,rn,0,W,320,580, su?'rgba(255,230,170,.8)':'rgba(230,244,246,.8)',26);
  P(c,[[0,320],[0,150],[90,140],[200,190],[300,240],[360,290],[360,600],[0,600]], v.mansion?'#54704e':'#607a5a');
  for(let i=0;i<12;i++){const hx=20+rn()*280,hy=200+(hx/300)*90+rn()*30;R(c,hx,hy,26+rn()*16,20,'#c9b18e');R(c,hx-2,hy-8,32+rn()*14,9,'#a34d3a');}
  if(v.white){R(c,150,180,74,64,'#efe8d8');R(c,146,172,82,10,'#b8b0a0');for(let wx=158;wx<216;wx+=18)R(c,wx,196,10,20,'#7d8894');}
  if(v.mansion){
    R(c,120,250,230,180,'#e9e2d2');R(c,112,240,246,14,'#b7a98f');
    P(c,[[150,240],[235,206],[320,240]],'#d9d0bc');
    for(let r=0;r<2;r++){for(let wx=140;wx<326;wx+=34){
      c.fillStyle='rgba(70,80,90,.55)';c.beginPath();
      c.moveTo(wx,306+r*58);c.lineTo(wx,282+r*58);c.arc(wx+9,282+r*58,9,Math.PI,0);c.lineTo(wx+18,306+r*58);c.closePath();c.fill();}}
  }
  P(c,[[0,470],[240,440],[300,470],[300,600],[0,600]],'#4a3d31');
  boat(c,470,420,1.3,'#5b4433');boat(c,650,380,1,'#6a4f38');boat(c,380,470,1.6,'#4e3a2c');
  crowd(c,rn,5,40,260,455,470,['#7a5c46','#5d6b7a','#8a4a3c']);
};

TPL.mine = (c,rn)=>{
  R(c,0,0,W,H,LG(c,0,H,'#2b2119','#171310'));
  ridge(c,rn,170,80,'#241b14',7);
  c.fillStyle='#0b0908';c.beginPath();c.moveTo(300,470);c.lineTo(300,300);c.arc(430,300,130,Math.PI,0);c.lineTo(560,470);c.closePath();c.fill();
  c.strokeStyle='#6b4f33';c.lineWidth=14;c.beginPath();c.moveTo(304,470);c.lineTo(304,304);c.arc(430,304,126,Math.PI,0);c.lineTo(556,470);c.stroke();
  c.strokeStyle='#8a7358';c.lineWidth=5;c.beginPath();c.moveTo(400,600);c.lineTo(422,470);c.moveTo(520,600);c.lineTo(474,470);c.stroke();
  c.lineWidth=3;for(let i=0;i<7;i++){const y=596-i*19,wh=60-i*6.5;c.beginPath();c.moveTo(450-wh,y);c.lineTo(450+wh,y);c.stroke();}
  P(c,[[600,470],[690,470],[678,452],[612,452]],'#463a2f');R(c,600,452,90,50,'#3a3129');
  C(c,620,512,12,'#191512');C(c,668,512,12,'#191512');
  const lamps=[[350,330],[520,330]];
  for(let i=0;i<lamps.length;i++){const lx=lamps[i][0],ly=lamps[i][1];C(c,lx,ly,26,'rgba(255,190,90,.16)');C(c,lx,ly,10,'rgba(255,205,120,.5)');C(c,lx,ly,4,'#ffd98a');}

TPL.mosaic = (c,rn)=>{
  R(c,0,0,W,H,'#b0a68c');
  const tile=24;
  function col(x,y){
    const F=[[430,230,95],[640,300,70]];
    for(let fi=0;fi<2;fi++){
      const dx=x-F[fi][0], dy=y-F[fi][1], fr=F[fi][2], d=Math.hypot(dx,dy);
      if(d<fr*.42)return ['#6b4a2a','#7a5632','#5d4026'][((x*7+y*13)|0)%3];
      if(d<fr){
        const a=Math.atan2(dy,dx);
        const band=Math.floor(((a+Math.PI)/TAU)*14 + (d/fr)*2)%2;
        return band?'#d8a12e':'#e6bd4a';
      }
    }
    if(x>470&&x<620&&y>360&&y<540){
      const hw=44+(y-360)*.28;
      if(Math.abs(x-545)<hw)return ['#5d7a86','#6b8a96','#4f6b78'][((x*3+y*7)|0)%3];
    }
    if(x>430&&x<560&&y>300&&y<380&&((x+y)%90<26))return '#5d7a40';
    if(x>250&&x<400&&y>330&&y<430&&((x*2-y+1200)%110<30))return '#6b8a4a';
    return ['#e8e0c8','#e2d8bc','#d8dcc8','#e8e4d0'][((x*5+y*11)|0)%4];
  }
  for(let ty=0;ty<H;ty+=tile){
    for(let tx=0;tx<W;tx+=tile){
      R(c,tx+1,ty+1,tile-2,tile-2,col(tx+tile/2,ty+tile/2));
    }
  }
};

{place:'新北淡水',artist:'張萬傳',title:'「淡水教堂」系列',medium:'油彩',tpl:'church',v:{},tex:['#a4402f','#a9b28a','#c3d7e2'],
 items:[{t:'seal',x:885,y:560},{t:'bird',x:475,y:78},{t:'cat',x:690,y:470}],
 fact:'張萬傳是「在野派」健將,筆觸豪放率性,一生反覆描繪淡水教堂與鮮魚靜物,紅磚在他筆下永遠帶著熱度。'},
{place:'新北八里',artist:'陳德旺',title:'「觀音山」系列',medium:'油彩',tpl:'mountain',v:{},tex:['#6f6478','#b9ad90','#8e9a8c'],
 items:[{t:'seal',x:70,y:555},{t:'fish',x:560,y:480},{t:'dragonfly',x:760,y:420}],
 fact:'陳德旺數十年反覆研究同一座觀音山,一座山畫一輩子,只為追問色彩與造形最根本的道理。'},
{place:'台北圓山',artist:'郭雪湖',title:'《圓山附近》',medium:'膠彩',tpl:'watercolor',v:{lush:true},tex:['#5d8a55','#8ab4a8','#c8d0a0'],
 items:[{t:'seal',x:885,y:555},{t:'bird',x:300,y:180},{t:'snail',x:180,y:545}],
 fact:'《圓山附近》以膠彩細密描繪基隆河畔的圓山風光,獲第二回台展特選,一草一木都被年輕的郭雪湖畫得發亮。'},
{place:'台北大稻埕',artist:'郭雪湖',title:'《南街殷賑》',medium:'膠彩',tpl:'street',v:{festive:true},tex:['#c98f6b','#b34a3a','#efe6cc'],
 items:[{t:'seal',x:70,y:560},{t:'cat',x:255,y:332},{t:'bird',x:340,y:268}],
 fact:'《南街殷賑》畫的是大稻埕迪化街霞海城隍廟口的節慶盛況——招牌林立、人聲鼎沸,是日治時期台北最熱鬧的一條街。'},
{place:'台北大稻埕',artist:'李石樵',title:'《市場口》',medium:'油彩',tpl:'market',v:{},tex:['#b3a482','#a8563f','#8f9a6a'],
 items:[{t:'seal',x:885,y:562},{t:'fish',x:280,y:322},{t:'cat',x:500,y:540}],
 fact:'李石樵《市場口》描繪戰後永樂市場前的眾生相,畫面裡的貧富對比,是畫家冷靜而深刻的社會觀察。'},
{place:'台北中山堂',artist:'黃土水',title:'《水牛群像》',medium:'石膏淺浮雕',tpl:'relief',v:{},tex:['#b99a6d','#9c7d55','#e0cba2'],
 items:[{t:'seal',x:888,y:552},{t:'bird',x:200,y:120},{t:'snail',x:620,y:528}],
 fact:'黃土水的浮雕遺作《水牛群像》完成於 1930 年,牧童與水牛在芭蕉葉下憩息,現藏台北中山堂,已指定為國寶。'},
{place:'台北天母',artist:'廖德政',title:'《清秋》',medium:'油彩',tpl:'mountain',v:{still:true},tex:['#d9c9a8','#7a5a3c','#d2702e'],
 items:[{t:'seal',x:70,y:560},{t:'butterfly',x:300,y:180},{t:'teapot',x:660,y:520}],
 fact:'廖德政長年從山坡上的居所遠望觀音山,《清秋》把桌上的果實與遠方的山,一起融進溫潤的秋日光線裡。'},
{place:'新北三峽',artist:'李梅樹',title:'《清溪浣衣》',medium:'油彩',tpl:'riverwash',v:{},tex:['#4f7a49','#a9c8c0','#b7a26f'],
 items:[{t:'seal',x:878,y:560},{t:'fish',x:500,y:470},{t:'dragonfly',x:250,y:270}],
 fact:'李梅樹以嚴謹的寫實筆法,描繪三峽溪畔浣衣的婦女。故鄉的日常風景,是他畫了一輩子的題材。'},
{place:'新北三峽',artist:'李梅樹',title:'三峽祖師廟(廟宇藝術)',medium:'建築・雕刻',tpl:'temple',v:{ornate:true},tex:['#b34a3a','#d8b03a','#b8ab8c'],
 items:[{t:'seal',x:70,y:555},{t:'cat',x:655,y:487},{t:'bird',x:480,y:206}],
 fact:'李梅樹晚年主持三峽祖師廟重建,以畫家之眼親自監修每一件石雕與木刻,使祖師廟被譽為「東方藝術殿堂」。'},
{place:'新竹',artist:'李澤藩',title:'「新竹風景」(水彩)',medium:'水彩',tpl:'watercolor',v:{},tex:['#9aa86b','#a8c4b0','#c8d0a0'],
 items:[{t:'seal',x:885,y:560},{t:'hat',x:350,y:480},{t:'bird',x:650,y:180}],
 fact:'李澤藩是新竹人、石川欽一郎的學生,擅長層層堆疊與「洗畫法」的水彩;他也是諾貝爾獎得主李遠哲的父親。'},
{place:'新竹竹東',artist:'蕭如松',title:'「竹東風景」(水彩)',medium:'水彩',tpl:'watercolor',v:{cool:true},tex:['#8aa496','#a8c4c4','#e6e0d0'],
 items:[{t:'seal',x:70,y:560},{t:'cat',x:240,y:450},{t:'dragonfly',x:430,y:300}],
 fact:'蕭如松在竹東任教數十年,畫風透明清冷、構圖嚴謹,如今他的故居畫室已保存為藝術園區。'},
{place:'台中',artist:'林之助',title:'《朝涼》',medium:'膠彩',tpl:'garden',v:{pergola:true},tex:['#7a9a52','#eee9dc','#cfc4a0'],
 items:[{t:'seal',x:885,y:560},{t:'snail',x:160,y:540},{t:'butterfly',x:500,y:118}],
 fact:'林之助《朝涼》描繪清晨棚架下的少女與白山羊,入選 1940 年日本紀元二千六百年奉祝展;「膠彩畫」一詞正是由他提出。'},
{place:'台中',artist:'顏水龍',title:'《向日葵》馬賽克壁畫',medium:'馬賽克',tpl:'mosaic',v:{},tex:['#e6bd4a','#e8e0c8','#5d7a86'],
 items:[{t:'seal',x:70,y:560},{t:'gecko',x:860,y:110},{t:'butterfly',x:300,y:470}],
 fact:'顏水龍畢生推動台灣工藝美術。他為台中太陽堂設計的《向日葵》馬賽克壁畫,曾被木板封住多年,後來才重見天日。'},
{place:'南投玉山',artist:'陳慧坤',title:'「玉山」系列',medium:'膠彩・油彩',tpl:'mountain',v:{snow:true},tex:['#5c6f80','#f4f7f7','#3f5346'],
 items:[{t:'seal',x:885,y:562},{t:'bird',x:300,y:140},{t:'star',x:720,y:80}],
 fact:'陳慧坤多次登上玉山寫生,把膠彩、油彩與塞尚式的堅實結構,融進台灣最高峰的稜線與雲海之中。'},
{place:'中央山脈',artist:'呂基正',title:'「台灣山岳」系列',medium:'油彩',tpl:'mountain',v:{dark:true},tex:['#2e3b33','#c8cdc4','#22302a'],
 items:[{t:'seal',x:70,y:560},{t:'hat',x:520,y:470},{t:'bird',x:760,y:120}],
 fact:'呂基正被稱為「山岳畫家」,一生揹著畫具攀登寫生,以厚實的筆觸畫出中央山脈的雄峻與流動的雲霧。'},
{place:'嘉義',artist:'陳澄波',title:'《嘉義街外》',medium:'油彩',tpl:'street',v:{earthy:true},tex:['#c8b088','#c3a97c','#b79a72'],
 items:[{t:'seal',x:885,y:560},{t:'cat',x:320,y:505},{t:'bird',x:500,y:262}],
 fact:'1926 年,陳澄波以《嘉義街外》入選日本帝展,是台灣油畫家的第一人,消息傳回全島為之振奮。'},
{place:'嘉義',artist:'陳澄波',title:'《夏日街景》',medium:'油彩',tpl:'street',v:{summer:true},tex:['#c8b088','#5c8a48','#b8ab8c'],
 items:[{t:'seal',x:70,y:560},{t:'hat',x:640,y:500},{t:'butterfly',x:230,y:392}],
 fact:'陳澄波筆下的嘉義街頭,行道樹的濃蔭與電線桿並立——那是他眼中故鄉邁向現代的記號,也是他最深的眷戀。'},
{place:'嘉義',artist:'林玉山',title:'《蓮池》',medium:'膠彩',tpl:'garden',v:{pond:true},tex:['#4f7a4a','#e8b8c8','#d8b03a'],
 items:[{t:'seal',x:885,y:560},{t:'fish',x:360,y:480},{t:'dragonfly',x:600,y:118}],
 fact:'林玉山清晨到嘉義牛稠山麓的荷塘寫生,以膠彩與金泥畫成《蓮池》,如今已指定為國寶。'},
{place:'嘉義',artist:'林玉山',title:'《大南門》',medium:'膠彩',tpl:'street',v:{gate:true},tex:['#8f8570','#a4402f','#c8b088'],
 items:[{t:'seal',x:70,y:555},{t:'bird',x:480,y:182},{t:'snail',x:780,y:545}],
 fact:'1927 年首回台展,年輕的林玉山與郭雪湖、陳進同時入選,震撼畫壇,三人從此被稱為「台展三少年」。'},
{place:'台南',artist:'郭柏川',title:'「台南孔廟」系列',medium:'油彩(宣紙)',tpl:'temple',v:{red:true},tex:['#b3452f','#b8ab8c','#5f7a4a'],
 items:[{t:'seal',x:885,y:560},{t:'cat',x:290,y:495},{t:'bird',x:555,y:222}],
 fact:'郭柏川回到故鄉台南後,獨創在宣紙上畫油彩,以簡練的筆意反覆描繪孔廟的朱紅牆與老樹。'},
{place:'台南',artist:'郭柏川',title:'「赤崁樓」系列',medium:'油彩(宣紙)',tpl:'temple',v:{tower:true},tex:['#c05545','#8f8570','#b8ab8c'],
 items:[{t:'seal',x:70,y:560},{t:'gecko',x:690,y:398},{t:'lantern',x:480,y:175}],
 fact:'赤崁樓是郭柏川一畫再畫的主題,他用書法般的線條勾出古蹟的骨架,把三百年的時光收進畫面。'},
{place:'台南',artist:'廖繼春',title:'《有香蕉樹的院子》',medium:'油彩',tpl:'garden',v:{},tex:['#d8a468','#5f8a3a','#b3452f'],
 items:[{t:'seal',x:885,y:560},{t:'snail',x:320,y:540},{t:'butterfly',x:600,y:250}],
 fact:'廖繼春畫下台南自宅的庭院,香蕉葉在南國陽光下閃閃發亮。《有香蕉樹的院子》於 1928 年入選帝展,現藏台北市立美術館。'},
{place:'高雄旗津',artist:'張啟華',title:'《旗后福聚樓》',medium:'油彩',tpl:'harbor',v:{mansion:true},tex:['#e9e2d2','#7fa5ad','#4a3d31'],
 items:[{t:'seal',x:70,y:560},{t:'crab',x:130,y:552},{t:'bird',x:430,y:120}],
 fact:'張啟華出身旗津,《旗后福聚樓》描繪港邊的洋樓,是他留學時期的早年代表作,也是高雄美術的重要起點。'},
{place:'高雄大樹',artist:'劉啟祥',title:'「小坪頂風景」',medium:'油彩',tpl:'watercolor',v:{south:true},tex:['#c8a06b','#b3452f','#c8b070'],
 items:[{t:'seal',x:885,y:560},{t:'hat',x:300,y:500},{t:'bird',x:620,y:190}],
 fact:'劉啟祥旅法歸來後,定居高雄大樹的小坪頂。南台灣的山丘、果園與熱帶的光,成為他後半生的畫題。'},
{place:'屏東三地門',artist:'陳進',title:'《三地門社之女》',medium:'膠彩',tpl:'portrait',v:{},tex:['#d8c4a0','#8a3a3a','#c8a86b'],
 items:[{t:'seal',x:70,y:560},{t:'butterfly',x:760,y:150},{t:'teapot',x:875,y:505}],
 fact:'「台展三少年」中唯一的女性陳進,以細膩典雅的膠彩描繪屏東三地門的排灣族婦女。《三地門社之女》現藏日本福岡亞洲美術館。旅程到此——恭喜你從基隆一路走到了屏東!'}
];

const imgCache={};   // idx -> {status:'loading'|'ok'|'fail', el}
let useImg=true;     // true=優先顯示原作圖檔
function ensureImg(i){
  if(i<0||i>=IMGS.length||!IMGS[i]||imgCache[i])return;
  imgCache[i]={status:'loading'};
  const im=new Image();
  im.referrerPolicy='no-referrer';
  im.onload=()=>{imgCache[i]={status:'ok',el:im};if(i===cur){drawAll();updateBadge();}};
  im.onerror=()=>{imgCache[i]={status:'fail'};if(i===cur){drawAll();updateBadge();}};
  im.src=IMGS[i];
}
function imgRect(){
  const rec=imgCache[cur];
  if(!(useImg&&rec&&rec.status==='ok'))return null;
  const im=rec.el;
  const s=Math.min(W/im.naturalWidth,H/im.naturalHeight);
  const w=im.naturalWidth*s,h=im.naturalHeight*s;
  return {x:(W-w)/2,y:(H-h)/2,w:w,h:h,el:im};
}
function ptOf(it){
  const r=imgRect();
  if(!r)return {x:it.x,y:it.y};
  return {x:r.x+it.x/W*r.w, y:r.y+it.y/H*r.h};
}
function updateBadge(){
  const b=$('srcBadge');if(!b)return;
  if(!useImg){b.textContent='🎨 重繪示意模式';return;}
  const rec=imgCache[cur];
  if(!rec){b.textContent='🎨 重繪示意';}
  else if(rec.status==='ok'){b.textContent='🖼 原作圖檔';}
  else if(rec.status==='loading'){b.textContent='⏳ 原作載入中…(先以示意顯示)';}
  else{b.textContent='🎨 重繪示意(原作連結無法載入)';}
}

/* ================= 音效與背景音樂 ================= */
let AC=null, mGain=null, muted=false, bgmTimer=null;
function initAudio(){
  if(AC)return;
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    mGain=AC.createGain();mGain.gain.value=.9;mGain.connect(AC.destination);
    startBGM();
  }catch(e){AC=null;}
}
function tone(f,dur,type,vol,when,slide){
  if(!AC||muted)return;
  dur=dur||.2;type=type||'sine';vol=vol||.12;when=when||0;
  const t0=AC.currentTime+when;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.setValueAtTime(f,t0);
  if(slide)o.frequency.exponentialRampToValueAtTime(slide,t0+dur);
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(vol,t0+.02);
  g.gain.exponentialRampToValueAtTime(.0001,t0+dur);
  o.connect(g);g.connect(mGain);
  o.start(t0);o.stop(t0+dur+.05);
}
const SCALE=[261.63,293.66,329.63,392,440,523.25];
function startBGM(){
  if(bgmTimer)return;
  bgmTimer=setInterval(()=>{
    if(muted||!AC)return;
    if(Math.random()<.72){
      const f=SCALE[(Math.random()*SCALE.length)|0]*(Math.random()<.2?2:1);
      tone(f,1.7,'triangle',.045);
      tone(f*2,1.7,'sine',.012);
    }
    if(Math.random()<.16)tone(130.8,2.4,'sine',.05);
  },820);
}
const sfx={
  found(){tone(660,.12,'triangle',.2);tone(880,.14,'triangle',.2,.1);tone(1320,.22,'sine',.15,.2);},
  wrong(){tone(170,.18,'square',.07,0,110);},
  fanfare(){[523,659,784,1046].forEach((f,i)=>tone(f,.3,'triangle',.2,i*.13));},
  cert(){[392,523,659,784,1046,1318].forEach((f,i)=>tone(f,.45,'triangle',.22,i*.16));},
  ui(){tone(520,.07,'sine',.08);}
};

/* ================= 遊戲流程 ================= */
let cur=0, found=new Set(), clicks=0, hits=0;
const SAVEKEY='twArtJourney';
function loadSave(){try{return JSON.parse(localStorage.getItem(SAVEKEY)||'{}');}catch(e){return{};}}
function persist(){try{localStorage.setItem(SAVEKEY,JSON.stringify({lvl:cur,clicks:clicks,hits:hits}));}catch(e){}}
function clearSave(){try{localStorage.removeItem(SAVEKEY);}catch(e){}}

function ring(c,x,y){
  c.strokeStyle='rgba(255,244,200,.5)';c.lineWidth=9;
  c.beginPath();c.arc(x,y,31,0,TAU);c.stroke();
  c.strokeStyle='#e6c65c';c.lineWidth=4;
  c.beginPath();c.arc(x,y,26,0,TAU);c.stroke();
}
function drawAll(){
  const L=LEVELS[cur];
  ctx.clearRect(0,0,W,H);
  const r=imgRect();
  if(r){
    R(ctx,0,0,W,H,'#221d18');
    ctx.strokeStyle='rgba(230,198,92,.4)';ctx.lineWidth=2;
    ctx.strokeRect(r.x-6,r.y-6,r.w+12,r.h+12);
    ctx.drawImage(r.el,r.x,r.y,r.w,r.h);
  }else{
    const rn=mulberry32(cur*7919+13);
    TPL[L.tpl](ctx,rn,L.v||{});
    strokeTex(ctx,rn,L.tex,420);
    vignette(ctx);
  }
  ctx.save();ctx.globalAlpha=.94;
  for(let i=0;i<L.items.length;i++){
    const p=ptOf(L.items[i]);
    ITEMS[L.items[i].t].draw(ctx,p.x,p.y);
  }
  ctx.restore();
  for(let i=0;i<L.items.length;i++){
    if(found.has(i)){const p=ptOf(L.items[i]);ring(ctx,p.x,p.y);}
  }
}
function updateHUD(){
  const L=LEVELS[cur];
  $('lvlNum').textContent='第 '+(cur+1)+' / 30 關';
  $('lvlPlace').textContent=L.place;
  $('lvlTitle').innerHTML=L.artist+'・'+L.title+'<br><span style="color:#8fa08f;font-size:12px">'+L.medium+'|找出 3 個隱藏細節</span>';
  $('jLabel').textContent='基隆 ➜ 屏東 目前位置:'+L.place;
  const dots=$('dots').children;
  for(let i=0;i<dots.length;i++){
    dots[i].className='dot'+(i<cur?' done':(i===cur?' now':''));
  }
  updateSlots();
}
function updateSlots(){
  const L=LEVELS[cur];
  const box=$('slots');box.innerHTML='';
  for(let i=0;i<L.items.length;i++){
    const d=document.createElement('div');
    d.className='slot'+(found.has(i)?' on':'');
    d.textContent=found.has(i)?('✓ '+ITEMS[L.items[i].t].label):'?';
    box.appendChild(d);
  }
}
function startLevel(i){
  cur=i;found=new Set();
  ensureImg(i);ensureImg(i+1);
  drawAll();updateHUD();updateBadge();persist();
}
function levelDone(){
  sfx.fanfare();
  const L=LEVELS[cur];
  $('mTitle').textContent=L.title;
  $('mArtist').textContent=L.artist+'|'+L.place+'|'+L.medium;
  $('mFact').textContent=L.fact;
  $('btnNext').textContent=(cur===29)?'領取證書 🏆':'下一關 →';
  $('modal').hidden=false;
}
cv.addEventListener('pointerdown',e=>{
  if(!$('modal').hidden)return;
  const r=cv.getBoundingClientRect();
  const x=(e.clientX-r.left)*W/r.width;
  const y=(e.clientY-r.top)*H/r.height;
  const L=LEVELS[cur];
  clicks++;
  let hit=-1;
  for(let i=0;i<L.items.length;i++){
    const p=ptOf(L.items[i]);
    if(!found.has(i)&&Math.hypot(p.x-x,p.y-y)<32){hit=i;break;}
  }
  if(hit>=0){
    found.add(hit);hits++;sfx.found();
    drawAll();updateSlots();persist();
    if(found.size>=L.items.length){setTimeout(levelDone,650);}
  }else{
    sfx.wrong();
    const fw=$('frameWrap');
    fw.classList.remove('shake');void fw.offsetWidth;fw.classList.add('shake');
  }
});
$('btnHint').addEventListener('click',()=>{
  sfx.ui();
  const L=LEVELS[cur];
  let idx=-1;
  for(let i=0;i<L.items.length;i++){if(!found.has(i)){idx=i;break;}}
  if(idx<0)return;
  const it=L.items[idx];
  const t0=performance.now();
  (function anim(t){
    const p=(t-t0)/1500;
    drawAll();
    if(p<1){
      const pt=ptOf(it);
      const rr=26+Math.sin(p*12)*10+p*12;
      ctx.strokeStyle='rgba(230,198,92,.9)';ctx.lineWidth=4;
      ctx.beginPath();ctx.arc(pt.x,pt.y,rr,0,TAU);ctx.stroke();
      requestAnimationFrame(anim);
    }
  })(t0+1);
});
$('btnMute').addEventListener('click',()=>{
  muted=!muted;
  $('btnMute').textContent=muted?'🔇':'🔊';
});
$('btnView').addEventListener('click',()=>{
  sfx.ui();
  useImg=!useImg;
  drawAll();updateBadge();
});
$('btnNext').addEventListener('click',()=>{
  sfx.ui();
  $('modal').hidden=true;
  if(cur===29){
    showCert();
  }else{
    startLevel(cur+1);
    window.scrollTo({top:0});
  }
});

/* ================= 證書 ================= */
const cc=$('cc'), cctx=cc.getContext('2d');
function renderCert(name){
  const c=cctx, CW=1000, CH=700;
  c.clearRect(0,0,CW,CH);
  R(c,0,0,CW,CH,'#f4edd8');
  c.save();c.globalAlpha=.05;
  const rn=mulberry32(88);
  for(let i=0;i<300;i++){C(c,rn()*CW,rn()*CH,1+rn()*2,'#8a6a3a');}
  c.restore();
  c.strokeStyle='#b3352b';c.lineWidth=10;c.strokeRect(24,24,CW-48,CH-48);
  c.strokeStyle='#c9a227';c.lineWidth=3;c.strokeRect(42,42,CW-84,CH-84);
  const corners=[[42,42],[CW-42,42],[42,CH-42],[CW-42,CH-42]];
  for(let i=0;i<4;i++){C(c,corners[i][0],corners[i][1],9,'#c9a227');C(c,corners[i][0],corners[i][1],4,'#f4edd8');}
  c.textAlign='center';
  c.fillStyle='#8a6a3a';
  c.font='20px "Microsoft JhengHei","PingFang TC",sans-serif';
  c.fillText('台 灣 藝 術 尋 寶 之 旅',CW/2,110);
  c.fillStyle='#5a3b2a';
  c.font='bold 64px "DFKai-SB","BiauKai","標楷體","Microsoft JhengHei",serif';
  c.fillText('藝 術 達 人 證 書',CW/2,190);
  c.strokeStyle='#c9a227';c.lineWidth=2;
  c.beginPath();c.moveTo(300,215);c.lineTo(700,215);c.stroke();
  c.fillStyle='#6b5a3e';
  c.font='22px "Microsoft JhengHei","PingFang TC",sans-serif';
  c.fillText('茲 證 明',CW/2,265);
  c.fillStyle='#b3352b';
  c.font='bold 52px "DFKai-SB","BiauKai","標楷體","Microsoft JhengHei",serif';
  c.fillText(name||'藝術小達人',CW/2,335);
  c.fillStyle='#4a3d2a';
  c.font='22px "Microsoft JhengHei","PingFang TC",sans-serif';
  c.fillText('自基隆港啟程,沿倪蔣懷、陳澄波、郭雪湖、李梅樹、陳進等',CW/2,395);
  c.fillText('前輩藝術家的足跡一路南行,抵達屏東三地門,',CW/2,432);
  c.fillText('三十關全數通過,尋得畫中細節九十處、落款印章三十枚。',CW/2,469);
  const acc=Math.round(hits/Math.max(1,clicks)*100);
  c.fillStyle='#8a6a3a';
  c.font='18px "Microsoft JhengHei","PingFang TC",sans-serif';
  c.fillText('眼力命中率 '+acc+'%|特此頒發,以資鼓勵',CW/2,515);
  const d=new Date();
  c.fillText(d.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric'}),CW/2,600);
  c.save();
  c.translate(790,560);c.rotate(-.1);
  c.fillStyle='#b3352b';
  c.fillRect(-45,-45,90,90);
  c.strokeStyle='#7a1f18';c.lineWidth=4;c.strokeRect(-45,-45,90,90);
  c.fillStyle='#f6ecd8';
  c.font='bold 36px "DFKai-SB","BiauKai","標楷體",serif';
  c.fillText('藝',0,-6);c.fillText('遊',0,32);
  c.restore();
  c.textAlign='left';
}
function showCert(){
  $('game').hidden=true;
  $('certScreen').hidden=false;
  sfx.cert();
  clearSave();
  renderCert($('certName').value.trim());
  window.scrollTo({top:0});
}
$('btnMake').addEventListener('click',()=>{sfx.ui();renderCert($('certName').value.trim());});
$('btnDL').addEventListener('click',()=>{
  sfx.ui();
  const a=document.createElement('a');
  a.download='台灣藝術達人證書.png';
  a.href=cc.toDataURL('image/png');
  a.click();
});
$('btnReplay').addEventListener('click',()=>{
  sfx.ui();
  clicks=0;hits=0;
  $('certScreen').hidden=true;
  $('game').hidden=false;
  startLevel(0);
});

/* ================= 初始化 ================= */
function buildIntro(){
  const grid=$('routeGrid');grid.innerHTML='';
  const sv=loadSave();
  const done=(typeof sv.lvl==='number')?sv.lvl:0;
  for(let i=0;i<LEVELS.length;i++){
    const s=document.createElement('div');
    s.className='stop'+(i<done?' done':'');
    s.innerHTML='<b>'+(i+1)+'. '+LEVELS[i].place+'</b>'+LEVELS[i].artist+' '+LEVELS[i].title;
    grid.appendChild(s);
  }
  const dots=$('dots');dots.innerHTML='';
  for(let i=0;i<30;i++){const d=document.createElement('span');d.className='dot';dots.appendChild(d);}
  if(typeof sv.lvl==='number'&&sv.lvl>0&&sv.lvl<30){
    const b=$('btnResume');
    b.hidden=false;
    b.textContent='▶ 繼續第 '+(sv.lvl+1)+' 關('+LEVELS[sv.lvl].place+')';
  }
}
$('btnStart').addEventListener('click',()=>{
  initAudio();sfx.ui();
  clicks=0;hits=0;
  $('intro').hidden=true;$('game').hidden=false;
  startLevel(0);
});
$('btnResume').addEventListener('click',()=>{
  initAudio();sfx.ui();
  const sv=loadSave();
  clicks=sv.clicks||0;hits=sv.hits||0;
  $('intro').hidden=true;$('game').hidden=false;
  startLevel(Math.min(29,sv.lvl||0));
});
buildIntro();
</script>
